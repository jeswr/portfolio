# CI gate for the portfolio site. This is the gate dependabot automerge waits on:
# a dependency bump only lands once lint + build + the Playwright core-path suite
# (homepage render + the load-bearing WebID content negotiation + SEO routes) are
# green against the updated build.
name: CI

on:
  push:
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint · build · e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Check-only lint: `npm run lint` runs eslint with --fix, which mutates
      # files and exits 0 on auto-fixable issues, so it can NEVER fail CI. Use
      # the check-only `lint:ci` (eslint without --fix) so a lint regression
      # actually fails the gate.
      - name: Lint (check-only)
        run: npm run lint:ci

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      # No standalone `npm run build` step: the Playwright webServer command is
      # `npm run build && npm run start`, so the production build is already
      # exercised by the e2e run (and a build failure fails the suite). Dropping
      # the duplicate build saves CI minutes.
      - name: Run Playwright suite (builds + serves the production bundle)
        run: npm run e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore
