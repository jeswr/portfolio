# Auto-merge dependabot PRs — but ONLY patch and minor bumps. Majors are left
# for manual review (a major can change a public API; it must not slip in
# unattended).
#
# HOW THE GATE WORKS (the standard, documented Dependabot automerge pattern):
# This workflow triggers on the PR's own `pull_request` event so that
# `dependabot/fetch-metadata` has the PR context it needs (the action reads the
# update-type from the PR — it does NOT work under `workflow_run`, which carries
# no PR context). For patch/minor bumps it calls `gh pr merge --auto`, which
# enables GitHub's native auto-merge: GitHub then merges the PR ONLY once ALL
# required status checks pass. There is no immediate `gh pr merge` and so no race
# against still-pending checks (e.g. a Vercel build that hasn't finished yet).
#
# WHAT ACTUALLY GATES THE MERGE — and the two maintainer (needs:user) steps:
# `--auto` waits for the REQUIRED status checks configured in branch protection.
# That is GitHub's correct, standard mechanism for gating a merge. Today main's
# branch protection (maintainer-owned) requires only the Vercel checks, so
# `--auto` currently gates on the Vercel build alone. For the repo's CI workflow
# (lint · build · Playwright e2e) to ALSO gate automerge, the maintainer must:
#   1. Mark the "CI" workflow check as a REQUIRED status check in branch
#      protection (Settings → Branches → main → "Require status checks to pass
#      before merging" → add "CI" / "lint · build · e2e").
#   2. Restore GitHub Actions BILLING (an account-wide block) so CI runs at all.
# Both are needs:user (branch protection + billing are maintainer-owned). Until
# they are done, `--auto` still gates on the existing required checks (Vercel),
# which is the standard, safe behaviour — nothing merges before its required
# checks pass.
name: Dependabot automerge

# Trigger on the PR itself so fetch-metadata has PR context (update-type, etc.).
on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    name: Auto-merge patch & minor dependabot PRs
    runs-on: ubuntu-latest
    # Only act on dependabot's own PRs.
    if: ${{ github.actor == 'dependabot[bot]' }}
    steps:
      - name: Fetch dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for patch & minor updates (NEVER major)
        # patch/minor → enable GitHub native auto-merge (squash). GitHub merges
        # only after ALL required status checks pass — so this never races
        # still-pending checks. A major bump falls through to no-op and stays
        # for manual review.
        if: >-
          ${{ steps.meta.outputs.update-type == 'version-update:semver-patch' ||
              steps.meta.outputs.update-type == 'version-update:semver-minor' }}
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
