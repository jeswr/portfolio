# Auto-merge dependabot PRs — but ONLY patch and minor bumps, and ONLY after the
# repo's own CI gate (lint · build · Playwright e2e) has concluded SUCCESS for the
# PR head commit. Majors are left for manual review (a major can change a public
# API; it must not slip in unattended).
#
# WHY AN EXPLICIT CI-SUCCESS GUARD (not just `gh pr merge --auto`):
# `--auto` merges once the BRANCH-PROTECTION required checks pass. On this repo
# the required checks are the Vercel deployment checks, and Vercel runs
# INDEPENDENTLY of GitHub Actions. So with `--auto` alone a patch/minor bump
# could auto-merge the moment the Vercel BUILD goes green — WITHOUT the repo's CI
# (lint + build + Playwright) ever running. A bump could break the WebID content
# negotiation behaviourally yet still merge because Vercel built it. Branch
# protection making CI a required check is maintainer-owned and is NOT something
# this workflow may rely on. So the workflow ENFORCES the gate itself:
#
#   The "Wait for CI success" step below polls the GitHub ACTIONS API
#   (`gh run list --workflow "CI"`) for the repo's `CI` workflow run on the PR
#   head SHA and only proceeds to merge when that run has CONCLUDED with
#   conclusion == success. It is FAIL-CLOSED: if CI is still pending, failed, or
#   — while GitHub Actions billing is blocked — never scheduled at all, the step
#   times out and EXITS 0 WITHOUT MERGING (it does not error the workflow; it
#   simply does not merge). Nothing ever auto-merges on a Vercel-only pass.
#
#   IMPORTANT — match the Actions workflow, NEVER a same-named third-party check:
#   the gate is scoped to the GitHub Actions workflow named `CI` (ci.yml's
#   top-level `name:`). It deliberately does NOT use the Checks API with a name
#   regex, because a Vercel deployment check named with "Build" (e.g.
#   "Vercel – Build") would match a loose regex and reintroduce the Vercel-only
#   merge path. A Vercel deploy is not a GitHub Actions workflow, so it can never
#   appear under `--workflow "CI"`.
#
# HOW THE GATE WORKS end-to-end:
# Triggers on the PR's own `pull_request` event so `dependabot/fetch-metadata`
# has the PR context it needs (the action reads the update-type from the PR — it
# does NOT work under `workflow_run`, which carries no PR context). For
# patch/minor bumps only, it waits for CI success on the head SHA, then squash-
# merges. `--auto` is additionally passed so that any OTHER required checks
# (e.g. Vercel) are also honoured — but the explicit CI-success guard above is
# the load-bearing gate.
#
# THE ONE needs:user STEP — RESTORE GITHUB ACTIONS BILLING:
# While Actions billing is account-blocked, the CI run never concludes success,
# so the guard never passes and nothing auto-merges. Once billing is restored,
# CI runs, the guard passes, and patch/minor automerge works as intended. Marking
# CI a required status check in branch protection is now OPTIONAL defence-in-depth
# (this workflow no longer depends on it).
name: Dependabot automerge

# Trigger on the PR itself so fetch-metadata has PR context (update-type, etc.).
on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    name: Auto-merge patch & minor dependabot PRs
    runs-on: ubuntu-latest
    # Only act on dependabot's own PRs.
    if: ${{ github.actor == 'dependabot[bot]' }}
    steps:
      - name: Fetch dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # FAIL-CLOSED CI-success guard. Polls the GitHub ACTIONS API for the repo's
      # `CI` workflow run on the PR head SHA and only marks ci-ok when that run has
      # CONCLUDED success. On timeout (still pending / failed / never scheduled —
      # incl. the billing-blocked case) it sets ci-ok=false and exits 0, so the
      # merge step below is skipped and NOTHING is merged. Only runs for
      # patch/minor bumps.
      #
      # WHY ACTIONS-API-ONLY (not the Checks API): the Checks API lists EVERY
      # check-run on the commit, including third-party deployment checks. Matching
      # those by a loose name regex (e.g. test("CI|build"; "i")) would let a
      # Vercel deployment check named with "Build" (e.g. "Vercel – Build") satisfy
      # the gate — reintroducing exactly the Vercel-only automerge path this guard
      # exists to prevent. `gh run list --workflow "CI"` is scoped to the GitHub
      # Actions workflow whose top-level `name:` is `CI` (ci.yml). A Vercel deploy
      # is NOT a GitHub Actions workflow, so it can NEVER appear in that list.
      - name: Wait for CI (lint · build · e2e) to conclude success on the head SHA
        id: ci
        if: >-
          ${{ steps.meta.outputs.update-type == 'version-update:semver-patch' ||
              steps.meta.outputs.update-type == 'version-update:semver-minor' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          REPO: ${{ github.repository }}
          # The GitHub Actions workflow whose success gates the merge. Must equal
          # ci.yml's top-level `name:` exactly (currently `CI`) so that
          # `gh run list --workflow "$CI_WORKFLOW"` resolves to that workflow and
          # ONLY that workflow — never a same-named third-party (e.g. Vercel) check.
          CI_WORKFLOW: CI
          # Bounded polling: 30 attempts × 30s ≈ 15 min ceiling. Fail-closed on timeout.
          MAX_ATTEMPTS: '30'
          SLEEP_SECONDS: '30'
        run: |
          set -euo pipefail
          echo "ci-ok=false" >> "$GITHUB_OUTPUT"
          echo "Waiting for the '$CI_WORKFLOW' GitHub Actions workflow to conclude success on head SHA $HEAD_SHA"
          attempt=0
          while [ "$attempt" -lt "$MAX_ATTEMPTS" ]; do
            attempt=$((attempt + 1))

            # AUTHORITATIVE + ONLY source: the GitHub Actions API, scoped to the
            # `CI` workflow (ci.yml's top-level `name:`) via `--workflow`. We then
            # require, for the SAME commit as the PR head:
            #   * headSha == the PR head SHA   (this exact commit, not an older run)
            #   * status   == "completed"      (the run has finished)
            #   * conclusion == "success"      (it passed)
            #   * event    == "pull_request"   (the PR-triggered run, not a push run)
            # A Vercel deployment is NOT a GitHub Actions workflow, so it can never
            # be returned by `--workflow "CI"` — and a third-party check merely
            # NAMED "Build" is invisible here. A pending/failed run yields 0.
            # Fail-closed: any API hiccup -> treat as "not yet successful", keep
            # polling (or time out).
            run_state="$(gh run list \
              --repo "$REPO" \
              --workflow "$CI_WORKFLOW" \
              --branch "$HEAD_REF" \
              --json headSha,databaseId,status,conclusion,event \
              --limit 50 \
              --jq "[.[] | select(.headSha == \"${HEAD_SHA}\")
                      | select(.status == \"completed\")
                      | select(.conclusion == \"success\")
                      | select(.event == \"pull_request\")]
                     | length" \
              2>/dev/null || echo "0")"

            if [ "${run_state:-0}" -gt 0 ] 2>/dev/null; then
              echo "Actions API: the '$CI_WORKFLOW' workflow concluded success on $HEAD_SHA."
              echo "ci-ok=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Attempt ${attempt}/${MAX_ATTEMPTS}: '$CI_WORKFLOW' not yet success on $HEAD_SHA; sleeping ${SLEEP_SECONDS}s."
            sleep "$SLEEP_SECONDS"
          done

          # Timed out: CI never concluded success (pending / failed / never
          # scheduled, e.g. Actions billing blocked). FAIL-CLOSED — do NOT merge,
          # but do NOT error the workflow. ci-ok stays false, merge step is skipped.
          echo "Timed out after ${MAX_ATTEMPTS} attempts: CI did not conclude success on $HEAD_SHA. Not merging."
          exit 0

      - name: Merge patch & minor updates (NEVER major) — only after CI success
        # Gate: patch/minor AND the explicit CI-success guard passed. `--auto`
        # additionally honours any OTHER required checks (e.g. Vercel), but the
        # CI-success guard above is the load-bearing gate. A major bump, or any
        # case where CI did not conclude success, is a no-op (left for review).
        if: >-
          ${{ (steps.meta.outputs.update-type == 'version-update:semver-patch' ||
               steps.meta.outputs.update-type == 'version-update:semver-minor') &&
              steps.ci.outputs.ci-ok == 'true' }}
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
